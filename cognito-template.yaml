AWSTemplateFormatVersion: '2010-09-09'

Parameters:
  Environment:
    Type: String
    AllowedValues: [dev, test, staging, prod]

Conditions:
  IsProdOrStaging: !Or [!Equals [!Ref Environment, staging], !Equals [!Ref Environment, prod]]
  IsProd: !Equals [!Ref Environment, prod]

Resources:
  TTLeagueCognitoUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub "ttleague-users-${Environment}"
      Policies:
        PasswordPolicy:
          MinimumLength: 12
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: true
          TemporaryPasswordValidityDays: !If [IsProdOrStaging, 2, 7]
      AutoVerifiedAttributes:
        - email
      Schema:
        - Name: active_seasons
          AttributeDataType: String
          Mutable: true
          StringAttributeConstraints:
            MaxLength: 2048
        - Name: managed_clubs
          AttributeDataType: String
          Mutable: true
          StringAttributeConstraints:
            MaxLength: 2048
      UsernameAttributes:
        - email
      UserPoolAddOns:
        AdvancedSecurityMode: !If [IsProdOrStaging, ENFORCED, "OFF"]
      AccountRecoverySetting:
        RecoveryMechanisms:
          - Name: verified_email
            Priority: 1
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: false
      EmailConfiguration: !If
        - IsProdOrStaging
        - EmailSendingAccount: DEVELOPER
          SourceArn: !Sub "arn:aws:ses:${AWS::Region}:${AWS::AccountId}:identity/ttleagueplayers.uk"
          From: !If
            - IsProd
            - "TT League Players <noreply@ttleagueplayers.uk>"
            - "TT League Players (staging) <noreply@staging.ttleagueplayers.uk>"
        - !Ref "AWS::NoValue"
      VerificationMessageTemplate: !If
        - IsProdOrStaging
        - DefaultEmailOption: CONFIRM_WITH_CODE
          EmailSubject: "Your TT League Players verification code"
          EmailMessage: "Hello!<br><br>Your verification code for TT League Players is {####}.<br>It expires in 24 hours.<br><br>If you didn't create this account, you can ignore this email."
        - !Ref "AWS::NoValue"

  TTLeagueCognitoUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub "ttleague-client-${Environment}"
      UserPoolId: !Ref TTLeagueCognitoUserPool
      GenerateSecret: false
      ExplicitAuthFlows: !If
        - IsProd
        - - ALLOW_USER_SRP_AUTH
          - ALLOW_REFRESH_TOKEN_AUTH
        - - ALLOW_USER_SRP_AUTH
          - ALLOW_REFRESH_TOKEN_AUTH
          - ALLOW_ADMIN_USER_PASSWORD_AUTH
      PreventUserExistenceErrors: ENABLED
      RefreshTokenValidity: !If [IsProdOrStaging, 2, 30]
      AccessTokenValidity: !If [IsProdOrStaging, 120, 1440]
      IdTokenValidity: !If [IsProdOrStaging, 120, 1440]
      TokenValidityUnits:
        RefreshToken: days
        AccessToken: minutes
        IdToken: minutes
      ReadAttributes:
        - email
        - email_verified
        - name
        - custom:active_seasons
        - custom:managed_clubs
      WriteAttributes:
        - email
        - name
        - custom:active_seasons
        - custom:managed_clubs

  TTLeagueCognitoUserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Sub "ttleague-${Environment}-${AWS::AccountId}-${AWS::Region}"
      UserPoolId: !Ref TTLeagueCognitoUserPool

Outputs:
  CognitoUserPoolId:
    Value: !Ref TTLeagueCognitoUserPool
    Export:
      Name: !Sub "ttleague-cognito-${Environment}-UserPoolId"
  
  CognitoClientId:
    Value: !Ref TTLeagueCognitoUserPoolClient
    Export:
      Name: !Sub "ttleague-cognito-${Environment}-ClientId"
  
  CognitoDomain:
    Value: !Sub "https://${TTLeagueCognitoUserPoolDomain}.auth.${AWS::Region}.amazoncognito.com"
    Export:
      Name: !Sub "ttleague-cognito-${Environment}-Domain"