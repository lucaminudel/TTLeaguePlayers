# espanso match file liked by /Users/lucaminudel/Library/Application Support/espanso

# For a complete introduction, visit the official docs at: https://espanso.org/docs/

# You can use this file to define the base matches (aka snippets)
# that will be available in every application when using espanso.

# Matches are substitution rules: when you type the "trigger" string
# it gets replaced by the "replace" string.

# yaml-language-server: $schema=https://raw.githubusercontent.com/espanso/espanso/dev/schemas/match.schema.json

matches:
  #
  # Codebase/Project prompts
  #
  - trigger: /ttarch # TT Architecture
    label: 1a. PRJ - Read the Architecture & Tech-Stack summary file
    replace: |
      Read from this file, the TTLeaguePlayersApp architecture and tech stack info:
      ~/Code/TTLeaguePlayers/prompts/codebase_info/ArchitectureAndTechStack.md

  - trigger: /ttinseason # TT In-season Domain Logic summary
    label: 1b. PRJ - Read the In-season Domain Logic summary file
    replace: |
      Read from this file, the TTLeaguePlayersApp In-season Domain Logic From Cognito Users & Configuration Files
      ~/Code/TTLeaguePlayers/prompts/codebase_info/FrontendInSeasonDomainLogic.md

  - trigger: /ttmanagedclubs # TT Actively Managed Clubs Domain Logic summary
    label: 1c. PRJ - Read the Actively Managed Clubs Logic summary file
    replace: |
      Read from this file, the TTLeaguePlayersApp Actively Managed Clubs Domain Logic From Cognito Users & Configuration Files
      ~/Code/TTLeaguePlayers/prompts/codebase_info/FrontendActivelyManagedClubsDomainLogic.md

  - trigger: /ttlogs # TT Logging and Exceptions summary
    label: 2. PRJ - Read the Logging and Exceptions guidelines
    replace: |
      Read from this file, the TTLeaguePlayersApp guidelines for logging and handling errors:
      ~/Code/TTLeaguePlayers/prompts/codebase_info/BackendLoggingAndExceptionGuidelines.md

  - trigger: /ttws # TT Workflow Staging
    label: 3. PRJ - End of task Staging/Commit and CI pipeline execution
    replace: |
      This is a general rule about what to do after you complete a task: After completing a step of the tasks for which you have made changes to files, and having successfully passed the verification steps, ask me if I want you to
      1) run the basic verification commands (defined by other instructions or rules)
      2) wait for me to manually review the file changes
      3) add the modified files to the stage area (assuming point 1 passes) in one command

  #
  # Tasks specific instructions 
  #

  - trigger: /ttwfv # TT Workflow Frontend Verification
    label: 4a. TSK - FrontEnd verification commands
    replace: |
      Read from this file, on the commands to run verification commands for the FrontEnd:
      ~/Code/TTLeaguePlayers/prompts/workflow/instructions/FrontEnd VerificationCommands.md
      
  - trigger: /ttwbv # TT Workflow Backend Verification
    label: 4b. TSK - Backend verification commands
    replace: |
      Read from this file, on the commands to run verification commands for the BackEnd:
      ~/Code/TTLeaguePlayers/prompts/workflow/instructions/BackEndVerificationCommands.md

  - trigger: /ttdebug # TT Workflow Debug local SAM lambdas
    label: 5 TSK - Start Debugging local SAM lambdas
    replace: |
      Read from this file, the debug instructions to debug the Lambdas and Api GatewayC# running on SAM locally:
      ~/Code/TTLeaguePlayers/prompts/workflow/instructions/LocalSAMBackEndDebugInstructions.md

  #
  # Workflow instructions 
  #
  - trigger: /ttwfwt # TT Workflow, Write Tests 
    label: 6a. WF - Test writing guidelines
    replace: |
      Read from this file, with the guidelines for writing tests:
      ~/Code/TTLeaguePlayers/prompts/workflow/steps_guidelines/WriteTestsGuidelines.md
  - trigger: /ttftests # TT Workflow, Fix Tests 
    label: 6b. WF - Broken Test fixing guidelines
    replace: |
      Read from this file, with the guidelines for fixing tests:
      ~/Code/TTLeaguePlayers/prompts/workflow/steps_guidelines/FixRedTestGuidelines.md

  - trigger: /tthandoff # TT Workflow Session Hand-off
    label: 7 WF - Session Handoff
    replace: |
      You're now handing this task off to another software engineer. Write a summary of
      A - what's still to be done, and
      B - how to do it 
      This software engineer, you are handing this taks off, has zero context about the task, so include in your summary 
      any info, context, references, details, and whatever will help them to execute point A and B.
      Include in your summary include relevant links to code files and .md files.
      Finally add a paragraph at the end of the suppari with info and insttructions for the LLM AI assistant that will help
      the software engineer with the task.